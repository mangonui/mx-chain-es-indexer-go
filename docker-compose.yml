services:
  # Development-only Elasticsearch profile.
  # Security is disabled here for local testing, and all published ports are
  # bound to loopback so this compose file is not network-exposed by default.
  elasticsearch:
    container_name: es-container
    image: docker.elastic.co/elasticsearch/elasticsearch:7.16.1
    environment:
      - "discovery.type=single-node"
      - "xpack.security.enabled=false"
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    networks:
      - es-net
    ports:
      - "127.0.0.1:9200:9200"
      - "127.0.0.1:9300:9300"
  kibana:
    container_name: kb-container
    image: docker.elastic.co/kibana/kibana:7.16.1
    environment:
      - ELASTICSEARCH_HOSTS=http://es-container:9200
    networks:
      - es-net
    depends_on:
      - elasticsearch
    ports:
      - "127.0.0.1:5601:5601"
networks:
  es-net:
    driver: bridge
